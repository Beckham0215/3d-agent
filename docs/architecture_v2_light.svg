<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 760" font-family="'Segoe UI',Inter,Arial,sans-serif" font-weight="600">
  <defs>
    <linearGradient id="gTitleL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="0.6" stop-color="#10a37f"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <marker id="arrowL" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M0,0 L10,6 L0,12 Z" fill="#10a37f"/>
    </marker>
    <filter id="glowL" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#10a37f" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="1280" height="760" fill="#ffffff"/>

  <!-- Title -->
  <text x="40" y="52" font-size="30" font-weight="700" fill="url(#gTitleL)">3DAgent — System Architecture</text>
  <text x="40" y="80" font-size="15" fill="#334155">Embodied AI loop over a Matterport digital twin&#160;&#160;·&#160;&#160;SENSE → THINK → ACT</text>

  <!-- ============ SENSE ============ -->
  <g>
    <rect x="40" y="120" width="300" height="560" rx="18" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="190" y="152" text-anchor="middle" font-size="17" font-weight="700" fill="#2563eb">SENSE</text>
    <text x="190" y="173" text-anchor="middle" font-size="12" fill="#334155">Multi-source input</text>

    <g>
      <rect x="64" y="196" width="252" height="92" rx="12" fill="#ffffff" stroke="#bfdbfe"/>
      <text x="80" y="226" font-size="15" font-weight="600" fill="#0f172a">🎙️ Voice + Chat</text>
      <text x="80" y="250" font-size="12" fill="#1e293b">Web Speech API · text box</text>
      <text x="80" y="270" font-size="12" fill="#1e293b">Natural-language commands</text>
    </g>
    <g>
      <rect x="64" y="306" width="252" height="92" rx="12" fill="#ffffff" stroke="#bfdbfe"/>
      <text x="80" y="336" font-size="15" font-weight="600" fill="#0f172a">📷 Viewport Screenshot</text>
      <text x="80" y="360" font-size="12" fill="#1e293b">Captured from current sweep</text>
      <text x="80" y="380" font-size="12" fill="#1e293b">for scan / locate / verify</text>
    </g>
    <g>
      <rect x="64" y="416" width="252" height="92" rx="12" fill="#ffffff" stroke="#bfdbfe"/>
      <text x="80" y="446" font-size="15" font-weight="600" fill="#0f172a">🏠 Matterport Space</text>
      <text x="80" y="470" font-size="12" fill="#1e293b">Digital twin + sweep graph</text>
      <text x="80" y="490" font-size="12" fill="#1e293b">current sweep UUID</text>
    </g>
    <g>
      <rect x="64" y="526" width="252" height="92" rx="12" fill="#ffffff" stroke="#bfdbfe"/>
      <text x="80" y="556" font-size="15" font-weight="600" fill="#0f172a">🤖 Auto Sweep Scan</text>
      <text x="80" y="580" font-size="12" fill="#1e293b">Batch images for auto-tag</text>
      <text x="80" y="600" font-size="12" fill="#1e293b">across selected sweeps</text>
    </g>
  </g>

  <!-- ============ THINK ============ -->
  <g>
    <rect x="400" y="120" width="470" height="560" rx="18" fill="#ecfdf5" stroke="#6ee7b7"/>
    <text x="635" y="152" text-anchor="middle" font-size="17" font-weight="700" fill="#0f766e">THINK — Flask Multi-Tenant Backend &amp; AI Core</text>

    <!-- Router -->
    <g filter="url(#glowL)">
      <rect x="424" y="176" width="422" height="96" rx="12" fill="#ffffff" stroke="#10a37f"/>
      <text x="444" y="206" font-size="15" font-weight="700" fill="#0f766e">🧠 Semantic Intent Router — LLaMA 3.3 70B</text>
      <text x="444" y="230" font-size="12" fill="#1e293b">14 intents: navigate · query · mark · activity · where-am-I ·</text>
      <text x="444" y="248" font-size="12" fill="#1e293b">scan · auto-tag · floor-plan · report · list-problems ·</text>
      <text x="444" y="266" font-size="12" fill="#1e293b">ReAct planning · visual · chat</text>
    </g>

    <!-- Vision -->
    <g>
      <rect x="424" y="288" width="205" height="150" rx="12" fill="#ffffff" stroke="#c4b5fd"/>
      <text x="436" y="316" font-size="14" font-weight="700" fill="#7c3aed">👁️ Hybrid Vision</text>
      <text x="436" y="340" font-size="11.5" fill="#1e293b">Scout 17B — names items</text>
      <text x="436" y="360" font-size="11.5" fill="#1e293b">YOLOv8-seg — boxes + outline</text>
      <text x="436" y="380" font-size="11.5" fill="#1e293b">Grounding DINO — open vocab</text>
      <text x="436" y="400" font-size="11.5" fill="#1e293b">BLIP VQA — offline fallback</text>
      <text x="436" y="424" font-size="11.5" fill="#475569">count · classify · segment</text>
    </g>

    <!-- ReAct -->
    <g>
      <rect x="641" y="288" width="205" height="150" rx="12" fill="#ffffff" stroke="#6ee7b7"/>
      <text x="653" y="316" font-size="14" font-weight="700" fill="#0f766e">♻️ ReAct Verifier</text>
      <text x="653" y="340" font-size="11.5" fill="#1e293b">1 · reason on requirement</text>
      <text x="653" y="360" font-size="11.5" fill="#1e293b">2 · query candidate rooms</text>
      <text x="653" y="380" font-size="11.5" fill="#1e293b">3 · teleport to each</text>
      <text x="653" y="400" font-size="11.5" fill="#1e293b">4 · vision-verify live state</text>
      <text x="653" y="424" font-size="11.5" fill="#475569">"a room for 6 people"</text>
    </g>

    <!-- DB -->
    <g>
      <rect x="424" y="454" width="422" height="92" rx="12" fill="#ffffff" stroke="#6ee7b7"/>
      <text x="444" y="482" font-size="14" font-weight="700" fill="#0f172a">🗄️ SQLAlchemy Relational Store (SQLite)</text>
      <text x="444" y="506" font-size="11.5" fill="#1e293b">users (worker/admin) · spaces · assets · asset-summary (counts, bbox, angle)</text>
      <text x="444" y="525" font-size="11.5" fill="#1e293b">scan history · maintenance reports · chat logs</text>
    </g>

    <!-- Services -->
    <g>
      <rect x="424" y="562" width="422" height="96" rx="12" fill="#ffffff" stroke="#6ee7b7"/>
      <text x="444" y="590" font-size="14" font-weight="700" fill="#0f172a">⚙️ Application Services</text>
      <text x="444" y="614" font-size="11.5" fill="#1e293b">Asset CRUD · scan-diff change detection · room-name suggestion</text>
      <text x="444" y="633" font-size="11.5" fill="#1e293b">maintenance triage · CSV / PDF export · per-user multi-tenant auth</text>
    </g>
  </g>

  <!-- ============ ACT ============ -->
  <g>
    <rect x="930" y="120" width="310" height="560" rx="18" fill="#f5f3ff" stroke="#c4b5fd"/>
    <text x="1085" y="152" text-anchor="middle" font-size="17" font-weight="700" fill="#7c3aed">ACT</text>
    <text x="1085" y="173" text-anchor="middle" font-size="12" fill="#334155">Embodied action</text>

    <g>
      <rect x="954" y="196" width="262" height="88" rx="12" fill="#ffffff" stroke="#ddd6fe"/>
      <text x="970" y="226" font-size="15" font-weight="600" fill="#0f172a">🧭 Navigate</text>
      <text x="970" y="250" font-size="12" fill="#1e293b">SDK move-to-sweep teleport</text>
      <text x="970" y="270" font-size="12" fill="#1e293b">rooms &amp; physical objects</text>
    </g>
    <g>
      <rect x="954" y="300" width="262" height="88" rx="12" fill="#ffffff" stroke="#ddd6fe"/>
      <text x="970" y="330" font-size="15" font-weight="600" fill="#0f172a">🖍️ Outline &amp; Tag Assets</text>
      <text x="970" y="354" font-size="12" fill="#1e293b">polygon highlight on object</text>
      <text x="970" y="374" font-size="12" fill="#1e293b">auto-tag to inventory</text>
    </g>
    <g>
      <rect x="954" y="404" width="262" height="88" rx="12" fill="#ffffff" stroke="#ddd6fe"/>
      <text x="970" y="434" font-size="15" font-weight="600" fill="#0f172a">🛠️ Maintenance Action</text>
      <text x="970" y="458" font-size="12" fill="#1e293b">file report · fly to fault</text>
      <text x="970" y="478" font-size="12" fill="#1e293b">severity triage · resolve</text>
    </g>
    <g>
      <rect x="954" y="508" width="262" height="88" rx="12" fill="#ffffff" stroke="#ddd6fe"/>
      <text x="970" y="538" font-size="15" font-weight="600" fill="#0f172a">🗺️ Minimap &amp; Export</text>
      <text x="970" y="562" font-size="12" fill="#1e293b">live position · markers</text>
      <text x="970" y="582" font-size="12" fill="#1e293b">annotated PDF / CSV</text>
    </g>
    <g>
      <rect x="954" y="612" width="262" height="56" rx="12" fill="#ffffff" stroke="#ddd6fe"/>
      <text x="970" y="638" font-size="15" font-weight="600" fill="#0f172a">💬 Context-Aware Reply</text>
      <text x="970" y="658" font-size="12" fill="#1e293b">spoken / written answer</text>
    </g>
  </g>

  <!-- Flow arrows -->
  <line x1="340" y1="400" x2="398" y2="400" stroke="#10a37f" stroke-width="2.5" marker-end="url(#arrowL)"/>
  <line x1="870" y1="400" x2="928" y2="400" stroke="#10a37f" stroke-width="2.5" marker-end="url(#arrowL)"/>
  <path d="M1085,672 C1085,718 190,718 190,650" fill="none" stroke="#10a37f" stroke-opacity="0.5" stroke-width="2" stroke-dasharray="6,6" marker-end="url(#arrowL)"/>
  <text x="640" y="742" text-anchor="middle" font-size="12" fill="#0f766e">closed loop — every action feeds the next observation</text>
</svg>
