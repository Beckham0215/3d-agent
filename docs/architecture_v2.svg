<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 760" font-family="'Segoe UI',Inter,Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a0f"/>
      <stop offset="1" stop-color="#10101a"/>
    </linearGradient>
    <linearGradient id="gTitle" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.6" stop-color="#1bc99e"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M0,0 L10,6 L0,12 Z" fill="#10a37f"/>
    </marker>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1280" height="760" fill="url(#bg)"/>

  <!-- Title -->
  <text x="40" y="52" font-size="30" font-weight="700" fill="url(#gTitle)">3DAgent — System Architecture</text>
  <text x="40" y="80" font-size="15" fill="rgba(255,255,255,0.5)">Embodied AI loop over a Matterport digital twin&#160;&#160;·&#160;&#160;SENSE → THINK → ACT</text>

  <!-- ============ SENSE ============ -->
  <g>
    <rect x="40" y="120" width="300" height="560" rx="18" fill="rgba(59,130,246,0.06)" stroke="rgba(59,130,246,0.35)"/>
    <text x="190" y="152" text-anchor="middle" font-size="17" font-weight="700" fill="#60a5fa">SENSE</text>
    <text x="190" y="173" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.45)">Multi-source input</text>

    <g>
      <rect x="64" y="196" width="252" height="92" rx="12" fill="#13131a" stroke="rgba(59,130,246,0.3)"/>
      <text x="80" y="226" font-size="15" font-weight="600" fill="#fff">🎙️ Voice + Chat</text>
      <text x="80" y="250" font-size="12" fill="rgba(255,255,255,0.55)">Web Speech API · text box</text>
      <text x="80" y="270" font-size="12" fill="rgba(255,255,255,0.55)">Natural-language commands</text>
    </g>
    <g>
      <rect x="64" y="306" width="252" height="92" rx="12" fill="#13131a" stroke="rgba(59,130,246,0.3)"/>
      <text x="80" y="336" font-size="15" font-weight="600" fill="#fff">📷 Viewport Screenshot</text>
      <text x="80" y="360" font-size="12" fill="rgba(255,255,255,0.55)">Captured from current sweep</text>
      <text x="80" y="380" font-size="12" fill="rgba(255,255,255,0.55)">for scan / locate / verify</text>
    </g>
    <g>
      <rect x="64" y="416" width="252" height="92" rx="12" fill="#13131a" stroke="rgba(59,130,246,0.3)"/>
      <text x="80" y="446" font-size="15" font-weight="600" fill="#fff">🏠 Matterport Space</text>
      <text x="80" y="470" font-size="12" fill="rgba(255,255,255,0.55)">Digital twin + sweep graph</text>
      <text x="80" y="490" font-size="12" fill="rgba(255,255,255,0.55)">current sweep UUID</text>
    </g>
    <g>
      <rect x="64" y="526" width="252" height="92" rx="12" fill="#13131a" stroke="rgba(59,130,246,0.3)"/>
      <text x="80" y="556" font-size="15" font-weight="600" fill="#fff">🤖 Auto Sweep Scan</text>
      <text x="80" y="580" font-size="12" fill="rgba(255,255,255,0.55)">Batch images for auto-tag</text>
      <text x="80" y="600" font-size="12" fill="rgba(255,255,255,0.55)">across selected sweeps</text>
    </g>
  </g>

  <!-- ============ THINK ============ -->
  <g>
    <rect x="400" y="120" width="470" height="560" rx="18" fill="rgba(16,163,127,0.06)" stroke="rgba(16,163,127,0.4)"/>
    <text x="635" y="152" text-anchor="middle" font-size="17" font-weight="700" fill="#1bc99e">THINK — Flask Multi-Tenant Backend &amp; AI Core</text>

    <!-- Router -->
    <g filter="url(#glow)">
      <rect x="424" y="176" width="422" height="96" rx="12" fill="#13131a" stroke="rgba(16,163,127,0.5)"/>
      <text x="444" y="206" font-size="15" font-weight="700" fill="#1bc99e">🧠 Semantic Intent Router — LLaMA 3.3 70B</text>
      <text x="444" y="230" font-size="12" fill="rgba(255,255,255,0.6)">14 intents: navigate · query · mark · activity · where-am-I ·</text>
      <text x="444" y="248" font-size="12" fill="rgba(255,255,255,0.6)">scan · auto-tag · floor-plan · report · list-problems ·</text>
      <text x="444" y="266" font-size="12" fill="rgba(255,255,255,0.6)">ReAct planning · visual · chat</text>
    </g>

    <!-- Vision -->
    <g>
      <rect x="424" y="288" width="205" height="150" rx="12" fill="#13131a" stroke="rgba(139,92,246,0.45)"/>
      <text x="436" y="316" font-size="14" font-weight="700" fill="#c084fc">👁️ Hybrid Vision</text>
      <text x="436" y="340" font-size="11.5" fill="rgba(255,255,255,0.6)">Scout 17B — names items</text>
      <text x="436" y="360" font-size="11.5" fill="rgba(255,255,255,0.6)">YOLOv8-seg — boxes + outline</text>
      <text x="436" y="380" font-size="11.5" fill="rgba(255,255,255,0.6)">Grounding DINO — open vocab</text>
      <text x="436" y="400" font-size="11.5" fill="rgba(255,255,255,0.6)">BLIP VQA — offline fallback</text>
      <text x="436" y="424" font-size="11.5" fill="rgba(255,255,255,0.45)">count · classify · segment</text>
    </g>

    <!-- ReAct -->
    <g>
      <rect x="641" y="288" width="205" height="150" rx="12" fill="#13131a" stroke="rgba(16,163,127,0.4)"/>
      <text x="653" y="316" font-size="14" font-weight="700" fill="#1bc99e">♻️ ReAct Verifier</text>
      <text x="653" y="340" font-size="11.5" fill="rgba(255,255,255,0.6)">1 · reason on requirement</text>
      <text x="653" y="360" font-size="11.5" fill="rgba(255,255,255,0.6)">2 · query candidate rooms</text>
      <text x="653" y="380" font-size="11.5" fill="rgba(255,255,255,0.6)">3 · teleport to each</text>
      <text x="653" y="400" font-size="11.5" fill="rgba(255,255,255,0.6)">4 · vision-verify live state</text>
      <text x="653" y="424" font-size="11.5" fill="rgba(255,255,255,0.45)">"a room for 6 people"</text>
    </g>

    <!-- DB -->
    <g>
      <rect x="424" y="454" width="422" height="92" rx="12" fill="#13131a" stroke="rgba(16,163,127,0.4)"/>
      <text x="444" y="482" font-size="14" font-weight="700" fill="#fff">🗄️ SQLAlchemy Relational Store (SQLite)</text>
      <text x="444" y="506" font-size="11.5" fill="rgba(255,255,255,0.6)">users (worker/admin) · spaces · assets · asset-summary (counts, bbox, angle)</text>
      <text x="444" y="525" font-size="11.5" fill="rgba(255,255,255,0.6)">scan history · maintenance reports · chat logs</text>
    </g>

    <!-- Services -->
    <g>
      <rect x="424" y="562" width="422" height="96" rx="12" fill="#13131a" stroke="rgba(16,163,127,0.4)"/>
      <text x="444" y="590" font-size="14" font-weight="700" fill="#fff">⚙️ Application Services</text>
      <text x="444" y="614" font-size="11.5" fill="rgba(255,255,255,0.6)">Asset CRUD · scan-diff change detection · room-name suggestion</text>
      <text x="444" y="633" font-size="11.5" fill="rgba(255,255,255,0.6)">maintenance triage · CSV / PDF export · per-user multi-tenant auth</text>
    </g>
  </g>

  <!-- ============ ACT ============ -->
  <g>
    <rect x="930" y="120" width="310" height="560" rx="18" fill="rgba(139,92,246,0.06)" stroke="rgba(139,92,246,0.4)"/>
    <text x="1085" y="152" text-anchor="middle" font-size="17" font-weight="700" fill="#c084fc">ACT</text>
    <text x="1085" y="173" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.45)">Embodied action</text>

    <g>
      <rect x="954" y="196" width="262" height="88" rx="12" fill="#13131a" stroke="rgba(139,92,246,0.3)"/>
      <text x="970" y="226" font-size="15" font-weight="600" fill="#fff">🧭 Navigate</text>
      <text x="970" y="250" font-size="12" fill="rgba(255,255,255,0.55)">SDK move-to-sweep teleport</text>
      <text x="970" y="270" font-size="12" fill="rgba(255,255,255,0.55)">rooms &amp; physical objects</text>
    </g>
    <g>
      <rect x="954" y="300" width="262" height="88" rx="12" fill="#13131a" stroke="rgba(139,92,246,0.3)"/>
      <text x="970" y="330" font-size="15" font-weight="600" fill="#fff">🖍️ Outline &amp; Tag Assets</text>
      <text x="970" y="354" font-size="12" fill="rgba(255,255,255,0.55)">polygon highlight on object</text>
      <text x="970" y="374" font-size="12" fill="rgba(255,255,255,0.55)">auto-tag to inventory</text>
    </g>
    <g>
      <rect x="954" y="404" width="262" height="88" rx="12" fill="#13131a" stroke="rgba(139,92,246,0.3)"/>
      <text x="970" y="434" font-size="15" font-weight="600" fill="#fff">🛠️ Maintenance Action</text>
      <text x="970" y="458" font-size="12" fill="rgba(255,255,255,0.55)">file report · fly to fault</text>
      <text x="970" y="478" font-size="12" fill="rgba(255,255,255,0.55)">severity triage · resolve</text>
    </g>
    <g>
      <rect x="954" y="508" width="262" height="88" rx="12" fill="#13131a" stroke="rgba(139,92,246,0.3)"/>
      <text x="970" y="538" font-size="15" font-weight="600" fill="#fff">🗺️ Minimap &amp; Export</text>
      <text x="970" y="562" font-size="12" fill="rgba(255,255,255,0.55)">live position · markers</text>
      <text x="970" y="582" font-size="12" fill="rgba(255,255,255,0.55)">annotated PDF / CSV</text>
    </g>
    <g>
      <rect x="954" y="612" width="262" height="56" rx="12" fill="#13131a" stroke="rgba(139,92,246,0.3)"/>
      <text x="970" y="638" font-size="15" font-weight="600" fill="#fff">💬 Context-Aware Reply</text>
      <text x="970" y="658" font-size="12" fill="rgba(255,255,255,0.55)">spoken / written answer</text>
    </g>
  </g>

  <!-- Flow arrows -->
  <line x1="340" y1="400" x2="398" y2="400" stroke="#10a37f" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="870" y1="400" x2="928" y2="400" stroke="#10a37f" stroke-width="2.5" marker-end="url(#arrow)"/>
  <!-- feedback loop ACT->SENSE -->
  <path d="M1085,672 C1085,718 190,718 190,650" fill="none" stroke="rgba(16,163,127,0.5)" stroke-width="2" stroke-dasharray="6,6" marker-end="url(#arrow)"/>
  <text x="640" y="742" text-anchor="middle" font-size="12" fill="rgba(16,163,127,0.7)">closed loop — every action feeds the next observation</text>
</svg>
